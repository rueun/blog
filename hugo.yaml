baseURL: https://rueun.github.io/
title: Rueun's Blog
theme: hugo-book

disablePathToLower: true
disableKinds:
  - term
paginate: 10
enableRobotsTXT: true

taxonomies:
  category: categories
  tag: tags

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 1
  highlight:
    style: base16-snazzy
    lineNos: true
    lineNumbersInTable: false
    guessSyntax: true

menu:
  after:
    - name: "Github"
      url: "https://github.com/rueun"
      weight: 10
    - name: "Tags"
      url: "/tags/"
      weight: 20
    - name: "Categories"
      url: "/categories/"
      weight: 30

services:
  googleAnalytics:
    ID: "G-CFWB44KHRY"

params:
  BookTheme: "light"
  BookToC: true
  BookSearch: true
  BookSection: docs
  BookDateFormat: "January 2, 2006"
  BookComments: false

  BookMenu:
    profileImage: "https://avatars.githubusercontent.com/u/64256409"
    githubLink: "https://github.com/rueun"
    recentPosts: true

  # SEO
  description: "Rueun's 개발 블로그"
  author: "Rueun"
  images:
    - "https://avatars.githubusercontent.com/u/64256409"

  # 검색엔진 인증
  googleSiteVerification: "" # Google Search Console 인증 코드
  naverSiteVerification: ""  # Naver Search Advisor 인증 코드

  # Schema.org
  schema:
    publisherType: "Person"
    publisherName: "Rueun"
    sameAs:
      - "https://github.com/rueun"
