{{ if and (eq .Section "posts") .Params.tags }}
<div class="post-footer-tags">
  <div class="tag-pills">
    {{ range .Params.tags }}
    <a href="{{ "/tags/" | relURL }}{{ . | urlize }}/" class="tag-pill">
      <i class="fa-solid fa-tag"></i> {{ . }}
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
