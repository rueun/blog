{{ if .Site.Params.BookMenu.recentPosts }}
<div class="recent-posts">
  <h3>최신 글</h3>
  <ul>
    {{ $posts := where .Site.RegularPages "Section" "posts" }}
    {{ range first 5 ($posts.ByDate.Reverse) }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
