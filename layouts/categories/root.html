{{ define "main" }}
<article class="markdown book-article">
  <div class="category-page-header">
    <h1><i class="fa-solid fa-folder-tree"></i> Categories</h1>
  </div>

  <div class="category-page-chips" style="justify-content: center;">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="category-page-chip">
      <i class="fa-solid fa-folder"></i> {{ .Title }}
    </a>
    {{ end }}
  </div>
</article>
{{ end }}
