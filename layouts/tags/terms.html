{{ define "main" }}
<article class="markdown book-article">
  <div class="category-page-header">
    <h1><i class="fa-solid fa-tags"></i> 태그</h1>
    <p>전체 태그 <em class="category-page-count">{{ len .Data.Terms }}</em></p>
  </div>

  <hr />

  <div class="tags-cloud">
    {{ range .Data.Terms.ByCount }}
    <a href="{{ .Page.RelPermalink }}" class="tag-cloud-item">
      {{ .Page.Title }} <span class="tag-cloud-count">({{ .Count }})</span>
    </a>
    {{ end }}
  </div>
</article>
{{ end }}
